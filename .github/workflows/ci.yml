name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff, black)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Black
        run: black --check src tests

  tests:
    name: Unit tests (no-sim, no-ros)
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,real]"
      - name: Run tests
        env:
          PHOENIX_SKIP_HEAVY: "1"
        run: pytest tests -m "not sim and not ros" --cov=src/phoenix --cov-report=term-missing
