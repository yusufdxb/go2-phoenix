# Deployment config for the ROS 2 policy node on the real GO2.

policy:
  # Path to exported ONNX (produced by sim2real/export.py)
  onnx_path: "checkpoints/phoenix-flat/policy.onnx"
  # Fallback TorchScript policy if onnxruntime missing.
  torchscript_path: "checkpoints/phoenix-flat/policy.pt"
  device: "cpu"                  # Jetson/on-robot inference
  # Flat-v0 policy has obs_dim=48 (proprio only, no height scanner).
  # Default in code is 187 (for Rough-v0); must be 0 for the flat policy.
  obs_pad_zeros: 0

  # Two-policy mode switch (stand-v2 @ cmd=0 / v3b @ walking). When
  # enabled, the node loads both ONNX sessions each tick and picks a
  # target via the state machine in phoenix.sim2real.mode_switch. When
  # disabled (default), only ``onnx_path`` is used — identical behaviour
  # to pre-mode-switch bringups. Spec:
  # docs/superpowers/specs/2026-04-19-phoenix-gate8-mode-switch-design.md.
  mode_switch:
    enabled: false
    stand_onnx_path: "checkpoints/phoenix-flat/policy.onnx"        # stand-v2 (Gate 7)
    walk_onnx_path:  "checkpoints/phoenix-flat/v3b/policy.onnx"    # v3b (re-exported 2026-04-19)
    enter_walk_thresh: 0.15    # m/s-equivalent; enter TRANS_TO_WALK above this
    enter_stand_thresh: 0.05   # m/s-equivalent; enter TRANS_TO_STAND below this (hysteresis band = 0.10)
    yaw_scale: 0.3             # rad/s → m/s equivalent for combined magnitude
    transition_ticks: 25       # 0.5 s @ 50 Hz linear blend

control:
  rate_hz: 50                    # matches sim decimation
  action_scale: 0.25             # policy output → joint delta
  default_joint_pos:
    FL_hip_joint: 0.0
    FR_hip_joint: 0.0
    RL_hip_joint: 0.0
    RR_hip_joint: 0.0
    FL_thigh_joint: 0.8
    FR_thigh_joint: 0.8
    RL_thigh_joint: 1.0
    RR_thigh_joint: 1.0
    FL_calf_joint: -1.5
    FR_calf_joint: -1.5
    RL_calf_joint: -1.5
    RR_calf_joint: -1.5

joint_order:
  # Must match the order used at training time.
  - "FL_hip_joint"
  - "FR_hip_joint"
  - "RL_hip_joint"
  - "RR_hip_joint"
  - "FL_thigh_joint"
  - "FR_thigh_joint"
  - "RL_thigh_joint"
  - "RR_thigh_joint"
  - "FL_calf_joint"
  - "FR_calf_joint"
  - "RL_calf_joint"
  - "RR_calf_joint"

latency:
  # Must match what the policy was trained with.
  action_delay_steps: 2          # @ 50 Hz = 40 ms

actuator_limits:
  # Per-joint safety clipping (rad, rad/s, N·m).
  position_margin_rad: 0.05      # stay inside URDF limits by this margin
  velocity_max_rad_s: 18.0
  torque_max_nm: 22.0

topics:
  imu: "/imu/data"
  joint_states: "/joint_states"
  cmd_vel: "/cmd_vel"
  joint_command: "/joint_group_position_controller/command"

safety:
  emergency_stop_topic: "/phoenix/estop"
  dead_mans_switch: true
  max_runtime_s: 120             # auto-stop after N seconds
  # Fail-closed timeouts. Stricter than the previous ad-hoc behaviour:
  # a stale estop heartbeat is treated as an asserted estop. Sensor
  # silence aborts the policy. Startup grace gives the rest of the
  # pipeline (estop publisher, lowstate bridge) time to come up.
  # 0.5s was tight enough to fail-closed on every BT hiccup observed in the
  # 2026-04-16 lab session. 0.8s still well inside human reaction time but
  # tolerates typical deadman radio jitter.
  estop_timeout_s: 0.8
  sensor_timeout_s: 0.2
  startup_grace_s: 3.0
  # Maximum time the node will wait for the first message on each required
  # topic (estop, imu, joint_state) before latching abort. Replaces the
  # old startup_grace_s wallclock gate. DDS discovery on the Jetson can
  # take >3s; 15s gives a generous margin without masking real publisher
  # failures.
  first_message_timeout_s: 15.0
