# PPO training config for the stand-only policy.
#
# Pivot from Flat-v0 after the 2026-04-16 retrain series (v1/v2/v3b) couldn't
# close the canonical-stand bench gap. Task collapse: velocity_command is
# constant zero, rel_standing_envs=1.0. Canonical stand is now the training
# distribution by construction, so the bench (|a|_inf < 0.3) should pass.
#
# 1000 iters at 10240 envs (~17 min on RTX 5070) is more than enough for a
# task this narrow — v3b hit plateau on the much harder velocity-tracking
# task at ~iter 100 with the same hyperparameters.

run:
  name: "phoenix-stand"
  output_dir: "checkpoints"
  log_interval: 1
  save_interval: 100
  max_iterations: 1000
  seed: 42
  device: "cuda:0"

env:
  config: "configs/env/stand.yaml"

algorithm:
  class_name: "PPO"
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.2
  entropy_coef: 0.005
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 1.0e-3
  schedule: "adaptive"
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.01
  max_grad_norm: 1.0

policy:
  class_name: "ActorCritic"
  # 0.5 matches ppo_flat.yaml v2+. Standing doesn't need exploratory noise.
  init_noise_std: 0.5
  actor_hidden_dims: [512, 256, 128]
  critic_hidden_dims: [512, 256, 128]
  activation: "elu"

runner:
  num_steps_per_env: 24
  empirical_normalization: true

logging:
  tensorboard: true
  wandb: false
  wandb_project: "go2-phoenix"
