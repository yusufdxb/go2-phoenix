# Fine-tuning config: continues from a baseline checkpoint with
# failure-weighted curriculum sampling.

run:
  name: "phoenix-adapt"
  output_dir: "checkpoints"
  log_interval: 1
  save_interval: 25
  max_iterations: 200        # fewer iters — fine-tune only
  seed: 42
  device: "cuda:0"

# Checkpoint to warm-start from. Override via CLI: --resume
resume:
  path: "checkpoints/phoenix-base/latest.pt"
  load_optimizer: false     # fresh optimizer state for fine-tune

env:
  config: "configs/env/rough.yaml"

curriculum:
  # Fraction of rollouts seeded from recorded real failures.
  # Kept at 0.0 until the reset_bridge world-frame mapping has a
  # hardware-captured parquet to validate against; the bridge itself is
  # wired and unit-tested (pos-relative-to-env-origin, xyzw→wxyz), it is
  # just disabled here to keep v0.2 results uncontaminated. See
  # ``docs/adapt_load_debug.md`` for the rationale.
  failure_sample_fraction: 0.0
  trajectory_dir: "data/failures"
  variation:
    config: "configs/replay/variations.yaml"

algorithm:
  class_name: "PPO"
  value_loss_coef: 1.0
  use_clipped_value_loss: true
  clip_param: 0.15            # smaller clip for fine-tune
  entropy_coef: 0.003
  num_learning_epochs: 4
  num_mini_batches: 4
  learning_rate: 3.0e-4       # lower LR for fine-tune
  schedule: "adaptive"
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.008
  max_grad_norm: 1.0

policy:
  class_name: "ActorCritic"
  # ``init_noise_std`` is overwritten when we load the baseline's learned
  # ``distribution.std_param``. Keeping the init value close to the
  # checkpoint's mean (~1.0) just avoids the pre-load actor producing a
  # wildly different distribution during the short window before load
  # runs. The real noise level is whatever the checkpoint stored.
  init_noise_std: 1.0
  actor_hidden_dims: [512, 256, 128]
  critic_hidden_dims: [512, 256, 128]
  activation: "elu"

runner:
  num_steps_per_env: 24
  empirical_normalization: true

logging:
  tensorboard: true
  wandb: false
